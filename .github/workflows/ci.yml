name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  soroban-contract:
    name: Soroban Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32v1-none

      - name: Check formatting
        working-directory: contracts/onboarding-bridge
        run: cargo fmt --check

      - name: Clippy
        working-directory: contracts/onboarding-bridge
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: contracts/onboarding-bridge
        run: cargo test

      - name: Build WASM (release)
        working-directory: contracts/onboarding-bridge
        run: cargo build --target wasm32v1-none --release

  api-server:
    name: API Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint --ext .ts src/

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint --ext .ts src/

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Bundle size check
        run: npm run bundle:check

      - name: Upload bundle analysis report
        uses: actions/upload-artifact@v4
        with:
          name: sdk-bundle-analysis
          path: sdk/dist/bundle/meta.json
          retention-days: 30

      - name: Verify strict consumer build
        run: npm run build:strict-consumer

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        run: npx vitest run --config vitest.e2e.config.ts
        env:
          NODE_ENV: test
          SOROBAN_RPC_URL: https://soroban-rpc.testnet.stellar.org
          BRIDGE_FEE_BPS: '30'
          API_KEYS: ci-test-key

  deploy-testnet:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    needs: [soroban-contract, api-server, sdk, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.SOROBAN_SOURCE_ACCOUNT != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32v1-none

      - name: Install Stellar CLI
        run: cargo install stellar-cli --locked

      - name: Deploy contract to testnet
        run: bash scripts/deploy.sh --network testnet
        env:
          SOURCE_ACCOUNT: ${{ secrets.SOROBAN_SOURCE_ACCOUNT }}
          BRIDGE_FEE_BPS: '30'

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-testnet
          path: deployments/deployment-testnet.json
          retention-days: 90
