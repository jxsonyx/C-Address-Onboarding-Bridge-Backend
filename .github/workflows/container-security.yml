name: Container Security Scanning

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".github/workflows/container-security.yml"
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".github/workflows/container-security.yml"
  schedule:
    # Weekly full scans every Monday at 6:00 AM UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-scan:
    name: Build and Scan Container Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    strategy:
      matrix:
        image-type: [production, development]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile${{ matrix.image-type == 'development' && '.dev' || '' }}
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.image-type }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.image-type }}-${{ github.sha }}
          format: "sarif"
          output: "trivy-results-${{ matrix.image-type }}.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          vuln-type: "os,library"
          exit-code: "0"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results-${{ matrix.image-type }}.sarif"
          category: trivy-${{ matrix.image-type }}

      - name: Run Trivy with table output
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.image-type }}-${{ github.sha }}
          format: "table"
          severity: "CRITICAL,HIGH,MEDIUM"
          vuln-type: "os,library"

      - name: Check for CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.image-type }}-${{ github.sha }}
          format: "json"
          output: "trivy-critical-${{ matrix.image-type }}.json"
          severity: "CRITICAL"
          exit-code: "1"
          ignore-unfixed: true

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.image-type }}-${{ github.sha }}
          format: spdx-json
          output-file: sbom-${{ matrix.image-type }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image-type }}-${{ github.sha }}
          path: sbom-${{ matrix.image-type }}.spdx.json
          retention-days: 90

      - name: Scan SBOM with Grype
        uses: anchore/scan-action@v3
        id: grype-scan
        with:
          sbom: sbom-${{ matrix.image-type }}.spdx.json
          fail-build: false
          severity-cutoff: high

      - name: Upload Grype SARIF report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.grype-scan.outputs.sarif }}
          category: grype-${{ matrix.image-type }}

  scan-summary:
    name: Vulnerability Summary Report
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: always()

    steps:
      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sbom-*
          merge-multiple: true

      - name: Generate vulnerability report
        run: |
          echo "# Container Vulnerability Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Vulnerability Policy" >> $GITHUB_STEP_SUMMARY
          echo "- ❌ **CRITICAL**: Blocks CI/CD pipeline" >> $GITHUB_STEP_SUMMARY
          echo "- ⚠️ **HIGH**: Warning (does not block)" >> $GITHUB_STEP_SUMMARY
          echo "- ℹ️ **MEDIUM**: Informational" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **LOW**: Informational" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## SBOM Generation" >> $GITHUB_STEP_SUMMARY
          echo "Software Bill of Materials (SBOM) generated using Syft in SPDX format." >> $GITHUB_STEP_SUMMARY
          echo "SBOM artifacts are available in the workflow artifacts section." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Review security findings in the Security tab" >> $GITHUB_STEP_SUMMARY
          echo "2. Check Dependabot alerts for automated fix suggestions" >> $GITHUB_STEP_SUMMARY
          echo "3. Update base images and dependencies to resolve vulnerabilities" >> $GITHUB_STEP_SUMMARY

  publish-sbom-release:
    name: Publish SBOM to Release
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sbom-*
          merge-multiple: true

      - name: Create release tag
        id: create-tag
        run: |
          TAG_NAME="sbom-$(date +%Y%m%d-%H%M%S)"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with SBOM
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.create-tag.outputs.tag_name }}
          name: SBOM Release ${{ steps.create-tag.outputs.tag_name }}
          body: |
            ## Software Bill of Materials (SBOM)

            This release contains the SBOM for container images built from commit ${{ github.sha }}.

            **Generated:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')
            **Format:** SPDX JSON
            **Tool:** Syft

            ### Files
            - `sbom-production.spdx.json` - Production image SBOM
            - `sbom-development.spdx.json` - Development image SBOM
          files: |
            sbom-*.spdx.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
